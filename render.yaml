services:
  - type: web
    name: easy-admin-supabase
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: UPLOAD_FOLDER
        value: /var/data/uploads
      - key: MAX_CONTENT_LENGTH
        value: "52428800"
    disk:
      name: easy-admin-uploads
      mountPath: /var/data
      sizeGB: 1
