<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Forgot Password | Easy Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; background: linear-gradient(rgba(244,246,249,.08), rgba(244,246,249,.08)), url('/static/login_background.png') center center / cover no-repeat fixed; font-family: Arial, sans-serif; }
        .login-card { background: rgba(255,255,255,.94); padding: 36px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.1); width: 100%; max-width: 460px; backdrop-filter: blur(6px); }
        .logo-img { max-height: 180px; display: block; margin: 0 auto 18px; border-radius: 8px; }
        .small-note { font-size: .86rem; color: #6c757d; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="/static/AFYCloudSolutions.png" alt="AFY Cloud Solutions Logo" class="logo-img">
        <h3 class="fw-bold text-center mb-2">Forgot Password</h3>
        <p class="small-note text-center mb-4">Enter your username and email address. If they match your account, a temporary password will be emailed to you.</p>

        {% if error_msg %}
        <div class="alert alert-danger py-2">{{ error_msg }}</div>
        {% endif %}
        {% if success_msg %}
        <div class="alert alert-success py-2">{{ success_msg }}</div>
        {% endif %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">Username</label>
                <input type="text" name="username" class="form-control form-control-lg" required autocomplete="username">
            </div>
            <div class="mb-4">
                <label class="form-label text-muted small fw-bold">Email Address</label>
                <input type="email" name="email" class="form-control form-control-lg" required autocomplete="email">
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg fw-bold">Email Temporary Password</button>
            <a href="/login" class="btn btn-outline-secondary w-100 mt-3 fw-bold">Back to Login</a>
        </form>
    </div>
</body>
</html>
