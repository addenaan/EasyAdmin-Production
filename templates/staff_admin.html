<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Staff Portal Admin | {{ session.get('company_name', 'Easy Admin') }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/staff-portal.css?v=20260623-staff1">
</head>
<body class="admin-body">
    <header class="admin-topbar">
        <div>
            <div class="eyebrow">Easy Admin</div>
            <h1>Staff Portal Admin</h1>
            <p>{{ session.get('company_name', 'Workspace') }}</p>
        </div>
        <div class="d-flex gap-2 flex-wrap">
            <a href="/hub" class="btn btn-light fw-bold">Back to Hub</a>
            <a href="/logout" class="btn btn-outline-light fw-bold">Logout</a>
        </div>
    </header>

    <main class="admin-wrap">
        <section id="adminToast" class="notice hidden"></section>
        <div class="admin-grid">
            <section class="admin-panel-card">
                <div class="section-heading"><h2>Staff portal accounts</h2><button id="refreshEmployeesBtn" class="small-link">Refresh</button></div>
                <p class="text-muted small">Create a staff login linked to an employee. Staff can only see their own bookings and leave requests.</p>
                <div id="employeesList" class="admin-list loading-card">Loading employees...</div>
            </section>
            <section class="admin-panel-card">
                <div class="section-heading"><h2>Leave requests</h2></div>
                <div class="filter-card compact admin-filter">
                    <select id="leaveStatusFilter">
                        <option>Pending</option>
                        <option>Approved</option>
                        <option>Declined</option>
                        <option>All</option>
                    </select>
                    <button id="refreshLeaveBtn" class="primary-btn">Load</button>
                </div>
                <div id="leaveRequestsList" class="admin-list loading-card">Loading leave requests...</div>
            </section>
        </div>
    </main>

    <script src="/static/easyadmin-formatters.js?v=20260622-format"></script>
    <script defer src="/static/staff-admin.js?v=20260623-staff1"></script>
</body>
</html>
